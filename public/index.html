<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

  <body>
    <header class="top-header">

        <span class="header-logo-mark">âœ¦</span>

      </div>
      <nav class="header-nav">
        <a class="browse" href="#">Browse</a>
        <a class="login" href="#">Login</a>
        <label for="search">
          <input
            id="search"
            class="search"

            type="text"
          />
        </label>
      </nav>
    </header>

    <section class="main-title">
      <div class="hero-bg-pattern"></div>
      <div class="hero-content">
        <div class="logo-frame">
          <div class="logo-ring">
            <img
              src="./pokesplash.jpg"

            />

        <div class="title-phrases">

          </div>
        </div>
      </div>
    </section>

    <div class="cards-display">
      <div class="cards-filter">
        <div class="filter-label">
          <span class="filter-gem">â—†</span>
          <span class="view-txt">Filter collection</span>
        </div>
        <select class="cards-selection">
          <option>Show all</option>
          <option>Name</option>
          <option>Type</option>
          <option>Stage</option>
          <option>Colors</option>
        </select>
      </div>
      <div class="cards-count" id="cardsCount"></div>
      <div class="cards" id="cardsContainer"></div>
    </div>

    <footer class="site-footer">
